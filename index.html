<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Love Letter</title>

<link rel="stylesheet" href="style.css" />

<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Envelope -->
<div id="envelope-container">
  <img src="envelope.png" alt="Envelope" id="envelope" />
  <p>♡ Letter for You ♡</p>
</div>

<!-- Letter -->
<div id="letter-container">

  <div class="letter-window" id="letter">
    <h1 id="letter-title">
      Would you give our relationship another chance?
    </h1>

    <img src="cat_heart.gif" class="cat" id="letter-cat" />

    <div class="buttons" id="letter-buttons">
      <img src="yes.png" class="btn yes-btn" alt="Yes" />

      <div class="no-wrapper">
        <img src="no.png" class="btn no-btn" alt="No" />
      </div>
    </div>
  </div>

  <!-- TEXT LUAR WINDOW -->
  <p id="final-text" class="final-text">
    <strong>You just made me the happiest person in the world!</strong><br>
    I promise I'll do better this time 💖
  </p>

</div>

<!-- 🔥 AUDIO -->
<audio id="love-music" src="musik1.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
